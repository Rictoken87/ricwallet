<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#030407">
  <meta name="description" content="RicWallet - Gasless wallet on Shibarium">
  <title>RicWallet</title>
  <link rel="stylesheet" href="../css/wallet.css">
  <style>
    /*  Page-specific styles  */
    .balance-card {
      background: linear-gradient(135deg, #0f1120 0%, #160d1a 100%);
      border-color: rgba(255,77,0,.2);
      text-align: center;
      padding: 28px 20px 24px;
      position: relative;
      overflow: hidden;
    }
    .balance-glow {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,77,0,.9), transparent);
    }
    .network-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      background: rgba(255,77,0,.1); border: 1px solid rgba(255,77,0,.25);
      font-family: var(--mono); font-size: 10px; color: var(--magma);
      margin-bottom: 16px;
    }
    .addr-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; }
    .addr-text { font-family: var(--mono); font-size: 11px; color: var(--smoke); word-break: break-all; }
    .copy-btn { background: none; border: none; cursor: pointer; color: var(--ash); padding: 4px; border-radius: 4px; transition: all .2s; }
    .copy-btn:hover { color: var(--magma); background: rgba(255,77,0,.1); }

    /*  Language dropdown  */
    .lang-menu {
      position: absolute; top: 56px; right: 20px;
      background: var(--card); border: 1px solid var(--rim);
      border-radius: 10px; overflow: hidden; z-index: 200; min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .lang-option {
      padding: 10px 16px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background .15s; color: var(--fog);
    }
    .lang-option:hover { background: rgba(255,255,255,.05); }
    .lang-option.active { color: var(--magma); }

    /*  Quick actions  */
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .action-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 16px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--rim);
      cursor: pointer; transition: all .2s;
      text-decoration: none; color: var(--fog);
    }
    .action-btn:hover { border-color: var(--rim2); background: rgba(255,77,0,.05); transform: translateY(-1px); }
    .action-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .action-icon.send { background: rgba(255,77,0,.15); }
    .action-icon.recv { background: rgba(0,255,178,.1); }
    .action-label { font-size: 12px; font-weight: 500; }

    /*  Token list  */
    .token-list { display: flex; flex-direction: column; gap: 2px; }
    .token-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer; transition: background .2s; }
    .token-row:hover { background: rgba(255,255,255,.03); }
    .token-info { flex: 1; }
    .token-name { font-size: 14px; font-weight: 500; color: var(--white); }
    .token-sub { font-family: var(--mono); font-size: 10px; color: var(--ash); }
    .token-bal { font-size: 14px; color: var(--white); text-align: right; }

    /*  Receive modal  */
    .receive-modal {
      position: fixed; inset: 0;
      background: rgba(3,4,7,.9); backdrop-filter: blur(10px);
      z-index: 500; display: flex; align-items: flex-end;
    }
    .receive-sheet {
      width: 100%; max-width: 480px; margin: 0 auto;
      background: var(--card); border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--rim); padding: 24px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .handle { width: 36px; height: 3px; background: var(--rim); border-radius: 2px; margin: 0 auto; }
    .sheet-title { font-family: var(--display); font-size: 22px; letter-spacing: 1px; color: var(--white); text-align: center; }
    .qr-box {
      width: 160px; height: 160px; margin: 4px auto;
      background: white; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #333; padding: 6px; word-break: break-all; text-align: center;
    }
    .full-addr {
      font-family: var(--mono); font-size: 11px; color: var(--fog);
      word-break: break-all; text-align: center;
      padding: 12px; background: var(--deep); border-radius: 8px; border: 1px solid var(--rim);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">RicWallet</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="connStatus"></div>
      <button class="lang-btn" onclick="toggleLangMenu()" id="langBtn">EN</button>
    </div>
  </div>

  <!-- Language dropdown -->
  <div class="lang-menu" id="langMenu" style="display:none">
    <div class="lang-option" data-lang="en" onclick="switchLang('en')">&#127468;&#127463; English</div>
    <div class="lang-option" data-lang="kh" onclick="switchLang('kh')">&#127472;&#127469; Khmer</div>
    <div class="lang-option" data-lang="vi" onclick="switchLang('vi')">&#127483;&#127475; Tieng Viet</div>
    <div class="lang-option" data-lang="zh" onclick="switchLang('zh')">&#127464;&#127475; Zhongwen</div>
  </div>

  <!-- Main content -->
  <div class="scroll-area" id="mainContent"></div>

  <!-- Bottom nav -->
  <nav class="bottomnav">
    <a class="nav-item active" href="index.html">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      <span id="nav-wallet">Wallet</span>
    </a>
    <a class="nav-item" href="https://www.ricswap.com/swap.html" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      <span id="nav-swap">Swap</span>
    </a>
    <a class="nav-item" href="learn.html">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span id="nav-learn">Learn</span>
    </a>
    <a class="nav-item" href="history.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="nav-history">History</span>
    </a>
  </nav>
</div>

<!-- Receive modal -->
<div class="receive-modal" id="receiveModal" style="display:none" onclick="closeReceive(event)">
  <div class="receive-sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="receiveTitle">Receive</div>
    <div class="qr-box" id="qrBox"></div>
    <div class="full-addr" id="fullAddr"></div>
    <button class="btn-primary" onclick="copyAddr()" id="copyAddrBtn">Copy Address</button>
    <button class="btn-ghost" onclick="closeReceiveModal()" id="closeBtn">Close</button>
  </div>
</div>

<script type="module">
import {
  connectMetaMask, connectWalletConnect, connectCoinbase,
  getAddress, isConnected, restoreSession, disconnect,
  getNativeBalance, getTokenBalance, formatAmount,
  shortAddr, copyToClipboard, showToast,
} from '../js/wallet-core.js';
import { getAllTokens, NATIVE_BONE } from '../js/tokens.js';
import { t, getLang, setLang } from '../js/i18n.js';

let currentLang = getLang();
let balances    = {};
let connecting  = false;

//  Init 
async function init() {
  applyLang();
  const addr = await restoreSession();
  if (addr) {
    renderDashboard(addr);
    loadBalances(addr);
  } else {
    renderConnectScreen();
  }
}

//  Language 
window.toggleLangMenu = () => {
  const menu = document.getElementById('langMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
};

window.switchLang = (lang) => {
  currentLang = lang;
  setLang(lang);
  document.getElementById('langMenu').style.display = 'none';
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  applyLang();
  const addr = getAddress();
  addr ? renderDashboard(addr) : renderConnectScreen();
};

function applyLang() {
  document.getElementById('langBtn').textContent      = currentLang.toUpperCase();
  document.getElementById('nav-wallet').textContent   = t('wallet',  currentLang);
  document.getElementById('nav-swap').textContent     = t('swap',    currentLang);
  document.getElementById('nav-learn').textContent    = t('learn',   currentLang);
  document.getElementById('nav-history').textContent  = t('history', currentLang);
  document.querySelectorAll('.lang-option').forEach(o => {
    o.classList.toggle('active', o.dataset.lang === currentLang);
  });
}

//  Connect screen 
function renderConnectScreen() {
  document.getElementById('mainContent').innerHTML = `
    <div class="connect-state fade-in">
      <div class="connect-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff4d00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
      </div>
      <div class="connect-title">${t('connect_wallet', currentLang)}</div>
      <div class="connect-sub">${t('connect_desc', currentLang)}</div>
      <div style="width:100%;display:flex;flex-direction:column;gap:10px;margin-top:8px;">
        <button class="btn-primary" onclick="doConnect('metamask')">
          <span style="display:flex;align-items:center;justify-content:center;gap:10px;">
            <svg width="18" height="18" viewBox="0 0 35 33" fill="none">
              <path d="M32.96 1L19.38 10.7l2.45-5.79L32.96 1z" fill="#E17726"/>
              <path d="M2.66 1l13.45 9.8-2.33-5.89L2.66 1z" fill="#E27625"/>
            </svg>
            ${t('connect_metamask', currentLang)}
          </span>
        </button>
        <button class="btn-ghost" onclick="doConnect('walletconnect')">
          <span style="display:flex;align-items:center;justify-content:center;gap:10px;">
            <svg width="18" height="18" viewBox="0 0 300 185" fill="#3b99fc">
              <path d="M61.4 36.8c48.9-47.9 128.3-47.9 177.2 0l5.9 5.8c2.4 2.4 2.4 6.2 0 8.6l-20.2 19.8c-1.2 1.2-3.2 1.2-4.4 0l-8.1-7.9c-34.1-33.4-89.4-33.4-123.5 0l-8.7 8.5c-1.2 1.2-3.2 1.2-4.4 0L54.9 51.9c-2.4-2.4-2.4-6.2 0-8.6l6.5-6.5z"/>
            </svg>
            ${t('connect_walletconnect', currentLang)}
          </span>
        </button>
        <button class="btn-ghost" onclick="doConnect('coinbase')">
          <span style="display:flex;align-items:center;justify-content:center;gap:10px;">
            <svg width="18" height="18" viewBox="0 0 1024 1024" fill="#1652f0">
              <circle cx="512" cy="512" r="512"/>
              <path d="M512 692c-99.4 0-180-80.6-180-180s80.6-180 180-180c89.6 0 164.2 65.7 178.1 151.2H870C855.5 334.1 697.5 220 512 220 308.7 220 144 384.7 144 588s164.7 368 368 368c185.5 0 343.5-114.1 358-283.2H690.1C676.2 758.3 601.6 692 512 692z" fill="white"/>
            </svg>
            ${t('connect_coinbase', currentLang)}
          </span>
        </button>
      </div>
    </div>`;
}

window.doConnect = async (type) => {
  if (connecting) return;
  connecting = true;
  try {
    let addr;
    if (type === 'metamask')      addr = await connectMetaMask();
    if (type === 'walletconnect') addr = await connectWalletConnect();
    if (type === 'coinbase')      addr = await connectCoinbase();
    renderDashboard(addr);
    loadBalances(addr);
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    connecting = false;
  }
};

//  Dashboard 
function renderDashboard(addr) {
  document.getElementById('mainContent').innerHTML = `
    <div class="card balance-card fade-in">
      <div class="balance-glow"></div>
      <div class="network-badge">
        <span class="dot dot-pulse" style="background:var(--green)"></span>
        Shibarium
      </div>
      <div class="amount-display" id="totalBal">--</div>
      <div class="amount-sub">BONE</div>
      <div class="addr-row">
        <span class="addr-text">${shortAddr(addr)}</span>
        <button class="copy-btn" onclick="copyWalletAddr()" title="${t('copied', currentLang)}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button class="copy-btn" onclick="disconnect()" style="font-size:10px;font-family:var(--mono);padding:2px 6px;border:1px solid var(--rim);border-radius:4px;">
          ${t('disconnect', currentLang)}
        </button>
      </div>
    </div>

    <div class="quick-actions fade-in">
      <a class="action-btn" href="send.html">
        <div class="action-icon send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4d00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </div>
        <span class="action-label">${t('send', currentLang)}</span>
      </a>
      <div class="action-btn" onclick="openReceive()">
        <div class="action-icon recv">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00ffb2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <span class="action-label">${t('receive', currentLang)}</span>
      </div>
    </div>

    <div>
      <div class="section-label">${t('your_tokens', currentLang)}</div>
      <div class="card" style="padding:8px;">
        <div class="token-list" id="tokenList">
          <div style="text-align:center;padding:20px;color:var(--ash);font-family:var(--mono);font-size:12px;">
            <div class="spinner" style="margin:0 auto 8px"></div>
            ${t('loading', currentLang)}
          </div>
        </div>
      </div>
    </div>

    <div style="text-align:center;padding:8px 0;">
      <span style="font-family:var(--mono);font-size:10px;color:var(--ash)">
        ${t('free_gas', currentLang)} &bull; ${t('powered_by', currentLang)}
      </span>
    </div>`;

  window.copyWalletAddr = () => {
    copyToClipboard(addr);
    showToast(t('copied', currentLang), 'success');
  };
}

//  Load balances 
async function loadBalances(addr) {
  const tokens = getAllTokens();
  const listEl = document.getElementById('tokenList');
  const balEl  = document.getElementById('totalBal');

  // BONE first
  try {
    const bone = await getNativeBalance(addr);
    balances['NATIVE'] = bone;
    if (balEl) balEl.textContent = formatAmount(bone, 18, 4);
  } catch (_) {}

  // ERC20s
  const rows = [];
  for (const token of tokens) {
    try {
      const bal = token.isNative
        ? (balances['NATIVE'] || 0n)
        : await getTokenBalance(token.address, addr);
      balances[token.address] = bal;
      rows.push({ token, bal, fmt: formatAmount(bal, token.decimals, 4) });
    } catch (_) {
      rows.push({ token, bal: 0n, fmt: '0' });
    }
  }

  if (!listEl) return;

  const nonZero = rows.filter(r => r.bal > 0n);
  if (nonZero.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:20px;color:var(--ash);font-size:13px;">${t('no_tokens', currentLang)}</div>`;
    return;
  }

  listEl.innerHTML = rows
    .sort((a, b) => (b.bal > a.bal ? 1 : -1))
    .map(({ token, fmt }) => `
      <div class="token-row">
        <div class="token-icon" style="background:${token.color}22;color:${token.color};font-family:var(--mono);font-size:10px;font-weight:700;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${token.symbol.slice(0,3)}
        </div>
        <div class="token-info">
          <div class="token-name">${token.symbol}${token.isLegacy ? ' <span style="font-size:9px;color:var(--ember)">v1</span>' : ''}</div>
          <div class="token-sub">${token.name}</div>
        </div>
        <div class="token-bal">${fmt}</div>
      </div>`).join('');
}

//  Receive modal 
window.openReceive = () => {
  const addr = getAddress();
  if (!addr) return;
  document.getElementById('receiveTitle').textContent  = t('receive', currentLang);
  document.getElementById('fullAddr').textContent      = addr;
  document.getElementById('copyAddrBtn').textContent   = t('copied', currentLang).replace('!','') + ' / Copy';
  document.getElementById('closeBtn').textContent      = t('close', currentLang);
  document.getElementById('qrBox').innerHTML           = `<div style="word-break:break-all;font-size:8px;color:#333">${addr}</div>`;
  document.getElementById('receiveModal').style.display = 'flex';
};

window.closeReceiveModal = () => {
  document.getElementById('receiveModal').style.display = 'none';
};

window.copyAddr = () => {
  copyToClipboard(getAddress());
  showToast(t('copied', currentLang), 'success');
};

// Safer check -- e.target.id instead of e.target comparison
window.closeReceive = (e) => {
  if (e.target.id === 'receiveModal') closeReceiveModal();
};

//  Click outside lang menu 
document.addEventListener('click', (e) => {
  const menu = document.getElementById('langMenu');
  const btn  = document.getElementById('langBtn');
  if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.style.display = 'none';
  }
});

init();
</script>
</body>
</html>
