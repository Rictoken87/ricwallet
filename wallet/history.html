<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#030407">
<title>History - RicWallet</title>
<link rel="stylesheet" href="../css/wallet.css">
<style>
.history-hero { padding:20px 0 8px; text-align:center; }
.history-title { font-family:var(--display); font-size:32px; letter-spacing:2px; color:var(--white); }
.savings-card { background:linear-gradient(135deg,#0a1a10,#0f1120); border:1px solid rgba(0,255,178,.2); border-radius:14px; padding:20px; display:flex; align-items:center; gap:16px; }
.savings-icon { width:44px; height:44px; border-radius:50%; background:rgba(0,255,178,.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.savings-num { font-family:var(--display); font-size:28px; color:var(--green); }
.savings-label { font-family:var(--mono); font-size:10px; color:var(--ash); letter-spacing:1px; text-transform:uppercase; }
.tx-row { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--rim); cursor:pointer; transition:background .15s; }
.tx-row:last-child { border-bottom:none; }
.tx-row:hover { background:rgba(255,255,255,.02); }
.tx-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tx-icon.sent     { background:rgba(255,77,0,.12); }
.tx-icon.received { background:rgba(0,255,178,.1); }
.tx-icon.swapped  { background:rgba(77,159,255,.1); }
.tx-icon.learned  { background:rgba(232,184,75,.1); }
.tx-info { flex:1; }
.tx-type { font-size:14px; font-weight:500; color:var(--white); }
.tx-time { font-family:var(--mono); font-size:10px; color:var(--ash); margin-top:2px; }
.tx-amount { text-align:right; }
.tx-val { font-size:14px; font-weight:500; }
.tx-val.out { color:var(--red); }
.tx-val.in  { color:var(--green); }
.tx-val.neutral { color:var(--fog); }
.tx-hash { font-family:var(--mono); font-size:10px; color:var(--ash); margin-top:2px; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 20px; gap:12px; }
.filter-tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; }
.filter-tabs::-webkit-scrollbar { height:0; }
.filter-tab { font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:6px 12px; border-radius:20px; border:1px solid var(--rim); color:var(--ash); cursor:pointer; white-space:nowrap; transition:all .15s; }
.filter-tab.active { background:rgba(255,77,0,.12); border-color:rgba(255,77,0,.4); color:var(--magma); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button onclick="history.back()" style="background:none;border:none;color:var(--fog);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span id="backBtn">Back</span>
    </button>
    <div class="topbar-logo" style="display:flex;align-items:center;gap:8px;">
      <img src="../assets/riclogo.jpeg" alt="RicWallet Logo" style="height:28px;width:auto;object-fit:contain;border-radius:4px;">
      <span>RicWallet</span>
    </div>
    <button class="lang-btn" id="langBtn" onclick="cycleLang()">EN</button>
  </div>

  <div class="scroll-area" id="mainContent">
    <!-- Injected -->
  </div>

  <nav class="bottomnav">
    <a class="nav-item" href="index.html">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <span id="nav-wallet">Wallet</span>
    </a>
    <a class="nav-item" href="https://www.ricswap.com/swap.html" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      <span id="nav-swap">Swap</span>
    </a>
    <a class="nav-item" href="learn.html">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span id="nav-learn">Learn</span>
    </a>
    <a class="nav-item active" href="history.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="nav-history">History</span>
    </a>
  </nav>
</div>

<script type="module">
import { t, getLang, setLang } from '../js/i18n.js';
import { restoreSession, isConnected, getAddress, shortAddr, explorerTx, showToast } from '../js/wallet-core.js';

const FORWARDER = '0xFC07CB6a642d66A7a10eee53871C8F47F9787346';
const EXPLORER  = 'https://shibariumscan.io';
const RPC       = 'https://rpc.shibarium.shib.io';

const langKeys = ['en','kh','vi','zh'];
let lang = getLang();
let filter = 'all';
let txList = [];
let loading = false;

async function init() {
  await restoreSession();
  applyLang();
  if (!isConnected()) { renderNotConnected(); return; }
  renderPage();
  loadHistory();
}

window.cycleLang = () => {
  lang = langKeys[(langKeys.indexOf(lang)+1) % langKeys.length];
  setLang(lang);
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  applyLang();
  renderPage();
  renderTxList();
};

function applyLang() {
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  document.getElementById('backBtn').textContent = t('back',lang);
  document.getElementById('nav-wallet').textContent  = t('wallet',lang);
  document.getElementById('nav-swap').textContent    = t('swap',lang);
  document.getElementById('nav-learn').textContent   = t('learn',lang);
  document.getElementById('nav-history').textContent = t('history',lang);
}

function renderNotConnected() {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state fade-in">
      <div class="connect-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff4d00" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
      <div class="connect-title" style="font-size:22px">${t('connect_wallet',lang)}</div>
      <button class="btn-primary" onclick="location.href='index.html'">${t('connect_wallet',lang)}</button>
    </div>`;
}

// -- Savings from Learn & Earn ---------------------------------
function getLearnProgress() {
  try { return JSON.parse(localStorage.getItem('ricwallet_learn') || '{}'); } catch { return {}; }
}
function learnTransactions() {
  const prog = getLearnProgress();
  return Object.entries(prog).map(([lessonId, data]) => ({
    type: 'learned',
    amount: data.ricEarned || 10,
    symbol: 'RIC',
    lessonId,
    timestamp: data.completedAt,
    hash: null,
    direction: 'in',
  }));
}

function renderPage() {
  const learnTxs = learnTransactions();
  const totalRIC = learnTxs.reduce((s, tx) => s + tx.amount, 0);
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <div class="history-hero fade-in">
      <div class="history-title">${t('transaction_history',lang).toUpperCase()}</div>
    </div>

    ${totalRIC > 0 ? `
    <div class="savings-card fade-in">
      <div class="savings-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00ffb2" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <div>
        <div class="savings-num">+${totalRIC} RIC</div>
        <div class="savings-label">${t('ric_earned',lang)}</div>
      </div>
    </div>` : ''}

    <div class="filter-tabs" id="filterTabs">
      <div class="filter-tab active" data-f="all" onclick="setFilter('all')">All</div>
      <div class="filter-tab" data-f="sent" onclick="setFilter('sent')">${t('sent',lang)}</div>
      <div class="filter-tab" data-f="received" onclick="setFilter('received')">${t('received',lang)}</div>
      <div class="filter-tab" data-f="swapped" onclick="setFilter('swapped')">${t('swapped',lang)}</div>
      <div class="filter-tab" data-f="learned" onclick="setFilter('learned')">${t('learned',lang)}</div>
    </div>

    <div class="card" style="padding:8px 16px;" id="txContainer">
      <div style="text-align:center;padding:20px;color:var(--ash);font-family:var(--mono);font-size:12px;">
        <div class="spinner" style="margin:0 auto 8px"></div>
        ${t('loading',lang)}
      </div>
    </div>
  `;
}

window.setFilter = (f) => {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.f === f);
  });
  renderTxList();
};

async function loadHistory() {
  const addr = getAddress();
  // Load on-chain events from ForwarderContract
  const chainTxs = await fetchForwarderEvents(addr);
  const learnTxs = learnTransactions();
  txList = [...chainTxs, ...learnTxs].sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
  renderTxList();
}

async function fetchForwarderEvents(userAddr) {
  try {
    // Get logs for RequestForwarded(from=userAddr)
    // Topic0: keccak256("RequestForwarded(address,address,uint256,uint256,uint256,bool)")
    const topic0 = '0x' + await keccak256Topic('RequestForwarded(address,address,uint256,uint256,uint256,bool)');
    const topic1 = '0x' + userAddr.slice(2).toLowerCase().padStart(64,'0');

    const res = await fetch(RPC, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        jsonrpc:'2.0', id:1, method:'eth_getLogs',
        params:[{
          address: FORWARDER,
          topics: [null, topic1], // from = userAddr
          fromBlock: 'earliest',
          toBlock: 'latest',
        }]
      })
    });
    const data = await res.json();
    const logs = data.result || [];

    return logs.slice(-50).map(log => {
      const success = log.data && log.data !== '0x'
        ? parseInt(log.data.slice(-2),16) === 1
        : true;
      return {
        type: 'sent',
        symbol: 'BONE',
        amount: null,
        direction: 'out',
        hash: log.transactionHash,
        blockNumber: parseInt(log.blockNumber, 16),
        timestamp: null,
        success,
      };
    });
  } catch { return []; }
}

// Hardcode the topic hash to avoid crypto dependency
async function keccak256Topic(sig) {
  // We use the known hash for our event
  // RequestForwarded event signature hash
  return 'a3e57c44'; // placeholder - in production use actual keccak256
}

function renderTxList() {
  const container = document.getElementById('txContainer');
  if (!container) return;

  const filtered = filter === 'all' ? txList : txList.filter(tx => tx.type === filter);
  const learnOnly = learnTransactions();
  const displayList = filtered.length > 0 ? filtered : (filter === 'all' ? learnOnly : []);

  if (displayList.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding:30px 0">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--ash)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div style="color:var(--ash);font-size:13px">${t('no_history',lang)}</div>
      </div>`;
    return;
  }

  container.innerHTML = displayList.map(tx => {
    const typeLabel = t(tx.type, lang) || tx.type;
    const time = tx.timestamp ? new Date(tx.timestamp).toLocaleDateString() : (tx.blockNumber ? `Block ${tx.blockNumber}` : '');
    const amtStr = tx.amount ? `${tx.direction === 'in' ? '+' : '-'}${tx.amount} ${tx.symbol}` : `${tx.symbol || 'TX'}`;
    const valCls = tx.direction === 'in' ? 'in' : tx.direction === 'out' ? 'out' : 'neutral';

    const icons = {
      sent:     `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d00" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
      received: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00ffb2" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
      swapped:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4d9fff" stroke-width="2" stroke-linecap="round"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>`,
      learned:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8b84b" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    };

    return `
      <div class="tx-row" ${tx.hash ? `onclick="window.open('${EXPLORER}/tx/${tx.hash}','_blank')"` : ''}>
        <div class="tx-icon ${tx.type}">${icons[tx.type] || icons.sent}</div>
        <div class="tx-info">
          <div class="tx-type">${typeLabel}</div>
          <div class="tx-time">${time}</div>
        </div>
        <div class="tx-amount">
          <div class="tx-val ${valCls}">${amtStr}</div>
          ${tx.hash ? `<div class="tx-hash">${shortAddr(tx.hash)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function shortAddr(h) {
  if (!h) return '';
  return h.slice(0,8)+'...'+h.slice(-6);
}

init();
</script>
</body>
</html>
